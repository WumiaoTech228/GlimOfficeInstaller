<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
    <defs>
        <!-- Gradients -->
        <linearGradient id="backGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#D83B01" />
            <stop offset="100%" stop-color="#B33000" />
        </linearGradient>
        <linearGradient id="frontGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#F25F22" />
            <stop offset="100%" stop-color="#EA4335" />
        </linearGradient>
        <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#46C0F8" />
            <stop offset="100%" stop-color="#1FA3E2" />
        </linearGradient>
        
        <!-- Shadows -->
        <filter id="boxShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="-2" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.3" />
        </filter>
        <filter id="arrowShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="-4" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.45" />
        </filter>
    </defs>

    <!-- Layer 1: Back Tab of Folder -->
    <polygon points="0,80 180,60 190,80 256,80 256,220 0,220" fill="url(#backGrad)" />

    <!-- Layer 2: Inside Tilted Office App Cards -->
    <!-- OneNote Purple Card -->
    <polygon points="36,40 88,36 88,140 36,140" fill="#8B5CF6" />
    <!-- Excel Green Card -->
    <polygon points="88,48 140,44 140,140 88,140" fill="#107C41" />
    <!-- Word Blue Card -->
    <polygon points="140,56 192,52 192,140 140,140" fill="#0078D4" />

    <!-- Layer 3: Front Flap of Folder with Top Edge Highlight -->
    <polygon points="0,120 256,96 256,220 0,220" fill="url(#frontGrad)" filter="url(#boxShadow)" />
    <line x1="0" y1="120" x2="256" y2="96" stroke="#FF966E" stroke-width="3" />

    <!-- Layer 4: Glassmorphic Installer Arrow -->
    <path d="M 108,80 H 148 V 160 H 200 L 128,232 L 56,160 H 108 Z" fill="url(#arrowGrad)" stroke="#6EDCFF" stroke-width="3" filter="url(#arrowShadow)" />
</svg>
